version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mtg-tracker.rule=Host(`DEINE_DOMAIN`)"
      - "traefik.http.routers.mtg-tracker.entrypoints=websecure"
      - "traefik.http.routers.mtg-tracker.tls.certresolver=letsencrypt"
      - "traefik.http.services.mtg-tracker.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    external: true
