version: '3.8'

services:
  frontend:
    image: ghcr.io/dastuta/mtg-commander:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mtg-tracker.rule=Host(`mtg-tracker.die-sons.cloud`)"
      - "traefik.http.routers.mtg-tracker.entrypoints=websecure"
      - "traefik.http.routers.mtg-tracker.tls.certresolver=letsencrypt"
      - "traefik.http.services.mtg-tracker.loadbalancer.server.port=80"
    networks:
      - traefik_default
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://mtg:mtg_password@db:5432/mtg_tracker
      - API_KEY=api-key@whatsgood2026
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`mtg-tracker.die-sons.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
    networks:
      - traefik_default
    depends_on:
      db:
        condition: service_healthy

  db:
    ports:
      - "5432:5432"
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mtg_tracker
      - POSTGRES_USER=mtg
      - POSTGRES_PASSWORD=mtg_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg -d mtg_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik_default

networks:
  traefik_default:
    external: true

volumes:
  pgdata:
