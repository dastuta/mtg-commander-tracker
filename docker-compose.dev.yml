version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://mtg:mtg_password@localhost:5432/mtg_tracker
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_EXPIRES_IN=7d
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mtg_tracker
      - POSTGRES_USER=mtg
      - POSTGRES_PASSWORD=mtg_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
